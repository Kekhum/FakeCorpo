name: fakecorpo

services:
  redis:
    image: redis:7-alpine
    container_name: fakecorpo-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    container_name: fakecorpo-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092,EXTERNAL://localhost:19092
      - --pandaproxy-addr=PLAINTEXT://0.0.0.0:8082,EXTERNAL://0.0.0.0:18082
      - --advertise-pandaproxy-addr=PLAINTEXT://redpanda:8082,EXTERNAL://localhost:18082
    ports:
      - "19092:19092"   # Kafka API (from host)
      - "18082:18082"   # Pandaproxy (HTTP) from host
      - "9644:9644"     # Admin API
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "info"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.7.2
    container_name: fakecorpo-redpanda-console
    depends_on:
      - redpanda
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"

  minio:
    image: minio/minio:latest
    container_name: fakecorpo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: fakecorpo-postgres
    environment:
      POSTGRES_USER: fakecorpo
      POSTGRES_PASSWORD: fakecorpo
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fakecorpo"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Simulators ----------
  orchestrator-clock:
    build:
      context: .
      dockerfile: simulators/orchestrator-clock/Dockerfile
    container_name: fakecorpo-orchestrator-clock
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      CLOCK_REDIS_URL: redis://redis:6379/0
      CLOCK_KAFKA_BROKERS: redpanda:9092
      CLOCK_KAFKA_TOPIC_TICK: clock.tick
      CLOCK_INITIAL_SIM_TIME: "2022-01-01T00:00:00+00:00"
      CLOCK_INITIAL_SPEED_RATIO: "288"
      CLOCK_TICK_INTERVAL_SECONDS: "1.0"
      CLOCK_PORT: "8000"
      CLOCK_LOG_LEVEL: "INFO"
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  redis-data:
  redpanda-data:
  minio-data:
  postgres-data:
